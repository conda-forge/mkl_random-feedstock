{% set version = "1.4.1" %}

package:
  name: mkl_random
  version: {{ version }}

source:
  url: https://github.com/IntelPython/mkl_random/archive/{{ version }}.tar.gz
  sha256: bf9a1e946648cf632f1774734aad465636228b19e817fa2845f13d15b01d4865

build:
  number: 0
  ignore_run_exports:
    - blas

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - python
    - setuptools
    - mkl-devel
    - cython
    - numpy
    - pip
  run:
    - python
    - mkl
    - numpy

test:
  commands:
    - pip check
    - pytest -v --pyargs mkl_random
  requires:
    - pip
    - pytest  # [python_impl != "pypy"]
    - pytest <8  # [python_impl == "pypy"]
    - mkl-service
    - numpy
  imports:
    - mkl_random
    - mkl_random.mklrand

about:
  home: http://github.com/IntelPython/mkl_random
  license: BSD-3-Clause
  license_file: LICENSE.txt
  description: NumPy-based implementation of random number generation sampling using Intel (R) Math Kernel Library, mirroring numpy.random, but exposing all choices of sampling algorithms available in MKL.
  summary: Intel (R) MKL-powered package for sampling from common probability distributions into NumPy arrays.


extra:
  recipe-maintainers:
    - ekomarova
    - ndgrigorian
    - xaleryb
    - jharlow-intel
